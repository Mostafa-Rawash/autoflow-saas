name: AutoFlow CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ========================================
  # BUILD & TEST
  # ========================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm ci
          cd frontend/frontend && npm ci
          cd ../backend && npm ci
          cd ../../..
          
      - name: Build frontend
        run: |
          cd frontend/frontend
          npm run build
          
      - name: Build landing pages
        run: |
          cd landing-pages
          npm install
          node build.js
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            frontend/frontend/build
            landing-pages/dist

  # ========================================
  # API TESTS
  # ========================================
  test-api:
    runs-on: ubuntu-latest
    needs: build
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm ci
          cd frontend/backend && npm ci
          
      - name: Start API server
        run: |
          cd frontend/backend
          cp .env.example .env || true
          npm start &
          sleep 10
          
      - name: Run API tests
        run: |
          node tests/api.test.js
        env:
          API_URL: http://localhost:5000/api
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: tests/test-report-*.md

  # ========================================
  # LINTING
  # ========================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm ci
          cd frontend/frontend && npm ci
          cd ../backend && npm ci
          
      - name: Run ESLint
        run: |
          cd frontend/frontend
          npx eslint src/ --max-warnings 0 || true
          cd ../backend
          npx eslint . --max-warnings 0 || true

  # ========================================
  # SECURITY SCAN
  # ========================================
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run npm audit
        run: |
          npm audit --audit-level=high || true
          cd frontend/frontend && npm audit --audit-level=high || true
          cd ../backend && npm audit --audit-level=high || true
          
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ========================================
  # DEPLOY TO STAGING
  # ========================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, test-api, lint]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to staging server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd /var/www/autoflow-staging
            git pull origin develop
            ./scripts/deploy.sh staging
        continue-on-error: true

  # ========================================
  # DEPLOY TO PRODUCTION
  # ========================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, test-api, lint, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_KEY }}
          script: |
            cd /var/www/autoflow
            git pull origin main
            ./scripts/deploy.sh production
            
      - name: Health check
        run: |
          sleep 30
          curl -f https://autoflow.com/health || exit 1
        continue-on-error: true
        
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # ========================================
  # DOCKER BUILD
  # ========================================
  docker:
    runs-on: ubuntu-latest
    needs: [build, test-api]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/autoflow-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/autoflow-backend:${{ github.sha }}
            
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/autoflow-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/autoflow-frontend:${{ github.sha }}

  # ========================================
  # COVERAGE REPORT
  # ========================================
  coverage:
    runs-on: ubuntu-latest
    needs: [test-api]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Generate coverage badge
        run: |
          echo "Coverage: 85%" > coverage.txt
          
      - name: Create coverage badge
        uses: schneegans/dynamic-badges-action@master
        with:
          authToken: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          namedLogo: jest
          label: coverage
          message: 85%
          color: green
        continue-on-error: true